        body { font-family: sans-serif; margin: 0; padding: 20px; background: #111; color: #eee; }
        header { text-align: center; margin-bottom: 30px; }
        a.back-btn { text-decoration: none; color: #4db8ff; font-size: 1.2rem; }
        
        .masonry-container {
            column-count: 4;
            column-gap: 15px;
            width: 100%;
        }
        
        @media (max-width: 1200px) { .masonry-container { column-count: 3; } }
        @media (max-width: 800px) { .masonry-container { column-count: 2; } }
        @media (max-width: 500px) { .masonry-container { column-count: 1; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 15px;
        }

        .item-link { display: block; text-decoration: none; width: 100%; }

        .masonry-item img { 
            width: 100%; 
            height: auto; 
            border-radius: 4px; 
            display: block;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .masonry-item:hover img { 
            transform: scale(1.05); 
            filter: brightness(1.1);
        }

        /* MODAL CSS */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            overflow: auto;
        }
        .modal:target { display: flex; }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            display: block;
            margin: 0 auto;
            border-radius: 4px;
        }

        .close-btn {
            position: absolute;
            top: -30px; right: 0;
            color: white;
            font-size: 30px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            z-index: 1001;
        }
        
        .modal-caption {
            color: #ccc;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
